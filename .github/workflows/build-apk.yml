name: Build Debug APK

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      # Gradle 빌드 JVM 메모리 설정 (gradlew 파싱 문제 우회)
      JAVA_TOOL_OPTIONS: "-Xmx4g -Xms1g"
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RealtimeTranslator-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
          name: "실시간 통역 앱 ${{ github.ref_name }}"
          body: |
            ## 📱 설치 방법
            1. `app-debug.apk` 파일 다운로드
            2. 안드로이드 폰으로 전송 후 설치
            3. 앱 실행 → HuggingFace 토큰 입력 → 모델 다운로드
