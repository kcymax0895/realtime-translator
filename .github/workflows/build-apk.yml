name: Build Debug APK

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      # Gradle 빌드 JVM 메모리 설정 (gradlew 파싱 문제 우회)
      JAVA_TOOL_OPTIONS: "-Xmx4g -Xms1g"
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4g"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RealtimeTranslator-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Commit Action APK to Branch
        run: |
          git config --global user.name "AutoBot"
          git config --global user.email "autobot@github.com"
          git fetch
          git checkout -B release-translator
          cp app/build/outputs/apk/debug/app-debug.apk RealtimeTranslator.apk
          git add -f RealtimeTranslator.apk
          git commit -m "Upload RealtimeTranslator APK directly" || echo "No changes"
          git push -f origin release-translator
